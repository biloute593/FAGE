name: Android Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android project files
        run: |
          # Create missing files without overwriting our custom AndroidManifest.xml
          flutter create --platforms=android . || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build_log.txt

      - name: Publish Error Log
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp build_log.txt ./error_log_output.txt
          git add error_log_output.txt
          git commit -m "ci: publish android build log [skip ci]" || true
          git pull --rebase origin main || true
          git push -u origin main || true

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: build_log.txt

      - name: Upload Android Package
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-Android-Build
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
