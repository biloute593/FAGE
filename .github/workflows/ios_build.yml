name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Generate iOS native project files
        run: |
          # Generate the iOS platform files without touching existing Dart code
          flutter create --platforms=ios --overwrite . 2>&1 | tee create_log.txt || true
          
          # CRITICAL: restore our actual app code and config!
          # flutter create --overwrite destroys lib/main.dart and pubspec.yaml
          git checkout lib/ pubspec.yaml
          
          # Inject Camera Permissions for the real biometric feed
          plutil -insert NSCameraUsageDescription -string "L'application utilise l'appareil photo pour l'authentification faciale." ios/Runner/Info.plist || true
          plutil -insert NSMicrophoneUsageDescription -string "Le micro est requis par le plugin de gestion vidéo." ios/Runner/Info.plist || true
          
          # Force iOS 15.5 Deployment Target for Google ML Kit compatibility
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.5'/g" ios/Podfile || true
          
          # Inject a post_install hook to force all Pods to compile at 15.5
          cat << 'EOF' >> ios/Podfile
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.5'
              end
            end
          end
          EOF
          
          echo "--- flutter create exit: $?"
          ls -la ios/ 2>/dev/null || echo "WARNING: ios/ dir not created"

      - name: Install dependencies
        run: |
          flutter pub get 2>&1

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings 2>&1 || true

      - name: Build iOS (No Codesign)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign -v 2>&1 | tee build_log.txt

      - name: Publish Error Log
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp build_log.txt ./error_log_output.txt
          git add error_log_output.txt
          git commit -m "ci: publish build log [skip ci]" || true
          git push -u origin main || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            create_log.txt
            build_log.txt

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -9 GestureFace.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-iOS-Build
          path: GestureFace.ipa
          retention-days: 7
