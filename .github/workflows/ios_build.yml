name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Generate iOS native project files
        run: |
          # Generate the iOS platform files without touching existing Dart code
          flutter create --platforms=ios --overwrite . 2>&1 | tee create_log.txt || true
          
          # CRITICAL: restore our actual app code and config!
          # flutter create --overwrite destroys lib/main.dart and pubspec.yaml
          git checkout lib/ pubspec.yaml
          
          echo "--- flutter create exit: $?"
          ls -la ios/ 2>/dev/null || echo "WARNING: ios/ dir not created"

      - name: Install dependencies
        run: |
          flutter pub get 2>&1

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings 2>&1 || true

      - name: Build iOS (No Codesign)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt || (echo "=== BUILD FAILED. LAST 200 LINES ===" && tail -n 200 build_log.txt && exit 1)

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            create_log.txt
            build_log.txt

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -9 GestureFace.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-iOS-Build
          path: GestureFace.ipa
          retention-days: 7
