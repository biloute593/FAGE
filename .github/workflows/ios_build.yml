name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate iOS native project files
        run: |
          # Generate the iOS platform files without touching existing Dart code
          flutter create --platforms=ios --overwrite . 2>&1 | tee create_log.txt || true
          
          # CRITICAL: restore our actual app code and config!
          git checkout lib/ pubspec.yaml
          
          # Inject Camera Permissions for the real biometric feed
          plutil -insert NSCameraUsageDescription -string "L'application utilise l'appareil photo pour l'authentification faciale." ios/Runner/Info.plist || true
          plutil -insert NSMicrophoneUsageDescription -string "Le micro est requis par le plugin de gestion vidéo." ios/Runner/Info.plist || true
          
          # Force iOS 15.5 Deployment Target for Google ML Kit compatibility
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.5'/g" ios/Podfile || true
          
          # Safe injection of post_install hook via awk
          awk '/post_install do |installer|/ {
            print; 
            print "  installer.pods_project.targets.each do |target|"; 
            print "    target.build_configurations.each do |config|"; 
            print "      config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"15.5\""; 
            print "      config.build_settings[\"ENABLE_BITCODE\"] = \"NO\"";
            print "    end"; 
            print "  end"; 
            next
          }1' ios/Podfile > ios/Podfile_temp && mv ios/Podfile_temp ios/Podfile
          
          echo "--- flutter create exit: $?"

      - name: Install dependencies
        run: |
          flutter pub get 2>&1

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings 2>&1 || true

      - name: Build iOS Simulator App (Bypasses Code Signing)
        run: |
          set -o pipefail
          flutter build ios --simulator --debug -v \
            --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
            2>&1 | tee build_log.txt
          # Fallback: use xcodebuild directly with explicit arm64 if flutter fails
          if [ $? -ne 0 ]; then
            cd ios
            xcodebuild \
              -workspace Runner.xcworkspace \
              -scheme Runner \
              -configuration Debug \
              -sdk iphonesimulator \
              -arch arm64 \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              IPHONEOS_DEPLOYMENT_TARGET=15.5 \
              ONLY_ACTIVE_ARCH=NO \
              EXCLUDED_ARCHS=x86_64 \
              2>&1 | tee ../build_log_xcode.txt
            cd ..
          fi

      - name: Publish Error Log
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp build_log.txt ./error_log_output.txt
          git add error_log_output.txt
          git commit -m "ci: publish build log [skip ci]" || true
          git push -u origin main || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            create_log.txt
            build_log.txt

      - name: Package iOS Bundle
        run: |
          mkdir -p Payload
          mv build/ios/iphonesimulator/Runner.app Payload/
          zip -r -9 GestureFace-Simulator.zip Payload/

      - name: Upload iOS Package
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-iOS-Simulator
          path: GestureFace-Simulator.zip
          retention-days: 7
