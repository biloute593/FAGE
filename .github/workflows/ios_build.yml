name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main", "copilot/copy-ipa-file-for-testing" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Generate iOS project files
        run: flutter create . --org com.gestureface

      - name: Install dependencies and generate platform
        run: |
          flutter create --platforms=ios .
          flutter pub get

      - name: Analyze Dart Code
        run: flutter analyze

      - name: Build iOS payload (No Codesign)
        run: |
          # Use --no-codesign to prevent failure at the xcode archive step
          flutter build ios --release --no-codesign || echo "Expected codesign failure, continuing..."
          
          # The Runner.app is still generated in the intermediate build directory
          mkdir -p Payload
          
          # Try the path where flutter leaves the app before archiving
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            mv build/ios/iphoneos/Runner.app Payload/
          elif [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            mv build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          else
            echo "Error: Could not find Runner.app"
            exit 1
          fi
          
          # Zip into an unsigned IPA
          zip -r -9 GestureFace.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-iOS-Build
          path: GestureFace.ipa
          retention-days: 7
