name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Setup iOS platform files
        run: flutter create --platforms=ios .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings || true

      - name: Build iOS payload (No Codesign)
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt
          
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -9 GestureFace.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureFace-iOS-Build
          path: GestureFace.ipa
          retention-days: 7
