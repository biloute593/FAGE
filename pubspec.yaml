name: gestureface
description: Système d'authentification biométrique double facteur simultané (visage + geste main) avec protection des données, panic mode et camouflage.
publish_to: 'none'
version: 3.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  rxdart: ^0.28.0
  get_it: ^7.7.0
  
  # Security & Storage
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.3
  crypto: ^3.0.3
  
  # Camera
  camera: ^0.10.5+9
  
  # TFLite inference
  tflite_flutter: ^0.10.4
  
  # Platform checks
  device_info_plus: ^10.1.0
  
  # UI & State
  provider: ^6.1.2
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fake_gallery/
